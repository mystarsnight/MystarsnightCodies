<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mystarsnight Code</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
}

/* TOP BAR */
#top{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#111;
  z-index:10;
}

.tab{
  padding:8px 14px;
  background:#222;
  border-radius:10px;
  cursor:pointer;
}

.active{
  background:linear-gradient(45deg,#00f5ff,#9f00ff);
}

/* AUTH */
#auth{
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:8px;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(45deg,#00f5ff,#9f00ff);
  color:white;
}

/* APP */
#app{display:none;}

/* FEEDS */
.feed{
  height:100vh;
  overflow-y:scroll;
  padding-top:60px;
}

/* POST */
.post{
  margin:10px auto;
  width:90%;
  max-width:400px;
  background:#151515;
  padding:15px;
  border-radius:15px;
}

/* ACTIONS */
.actions{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.icon{
  background:#222;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* POST BOX */
#postBox{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

/* NOTIF */
#notif{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:10px;
  border-radius:10px;
  display:none;
  z-index:999;
}
</style>
</head>

<body>

<div id="notif"></div>

<!-- AUTH -->
<div id="auth">
  <h2>Mystarsnight Code</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="username" placeholder="Username">
  <input id="avatar" placeholder="Avatar URL">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

  <!-- TOP TABS -->
  <div id="top">
    <div class="tab active" onclick="show('discover')">🔍 Discover</div>
    <div class="tab" onclick="show('codies')">🎥 Codies</div>
  </div>

  <!-- DISCOVER -->
  <div class="feed" id="discover"></div>

  <!-- CODIES (TikTok style) -->
  <div class="feed" id="codies" style="display:none;"></div>

  <!-- POST -->
  <div id="postBox">
    <input id="postInput" placeholder="Post code...">
    <button onclick="post()">🚀</button>
  </div>

</div>

<script>
const supabase = supabase.createClient(
"https://heemtxdkjxnlzggtpbsf.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZW10eGRranhubHpnZ3RwYnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODUwMTcsImV4cCI6MjA5MjQ2MTAxN30.C-Q1X4XGjz4mZyrkkmW3N4uPFGu1eDe9sb7QWfs9_dU"
);

let user=null;

/* NOTIF */
function notify(t){
  notif.innerText=t;
  notif.style.display="block";
  setTimeout(()=>notif.style.display="none",2000);
}

/* SIGNUP */
async function signup(){
  const { data } = await supabase.auth.signUp({
    email:email.value,
    password:password.value
  });

  await supabase.from("profiles").update({
    username:username.value,
    avatar_url:avatar.value,
    is_admin: email.value==="blakestalder123@gmail.com"
  }).eq("id",data.user.id);

  notify("Account created");
}

/* LOGIN */
async function login(){
  const { data } = await supabase.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });

  start(data.user);
}

/* START */
async function start(u){
  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id",u.id)
    .single();

  user=data;

  auth.style.display="none";
  app.style.display="block";

  loadDiscover();
  loadCodies();
}

/* SWITCH TABS */
function show(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");

  discover.style.display = tab==="discover"?"block":"none";
  codies.style.display = tab==="codies"?"block":"none";
}

/* DISCOVER (GLOBAL POSTS) */
async function loadDiscover(){
  const { data } = await supabase
    .from("posts")
    .select("*, profiles(username)")
    .order("created_at",{ascending:false});

  discover.innerHTML="";

  data.forEach(p=>{
    discover.innerHTML+=`
      <div class="post">
        <b>${p.profiles?.username||"User"}</b>
        <p>${p.content}</p>

        <div class="actions">
          <div class="icon" onclick="like('${p.id}')">❤️</div>
          <div class="icon" onclick="comment('${p.id}')">💬</div>
        </div>
      </div>
    `;
  });
}

/* CODIES (DOOM SCROLL STYLE) */
async function loadCodies(){
  const { data } = await supabase
    .from("posts")
    .select("*, profiles(username)")
    .order("created_at",{ascending:false});

  codies.innerHTML="";

  data.forEach(p=>{
    codies.innerHTML+=`
      <div class="post" style="height:90vh;">
        <h3>${p.profiles?.username||"User"}</h3>
        <p>${p.content}</p>

        <div class="actions">
          <div class="icon" onclick="like('${p.id}')">❤️</div>
          <div class="icon" onclick="comment('${p.id}')">💬</div>
        </div>
      </div>
    `;
  });
}

/* POST */
async function post(){
  await supabase.from("posts").insert({
    user_id:user.id,
    content:postInput.value
  });

  postInput.value="";
  loadDiscover();
  loadCodies();
}

/* LIKE */
async function like(id){
  await supabase.from("likes").insert({
    user_id:user.id,
    post_id:id
  });

  notify("Liked");
}

/* COMMENT */
async function comment(id){
  const t=prompt("Comment:");
  if(!t) return;

  await supabase.from("comments").insert({
    post_id:id,
    user_id:user.id,
    content:t
  });

  notify("Comment sent");
}
</script>

</body>
</html>
