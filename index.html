<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mystarsnight Code</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:white;
}

#auth{
  display:flex;
  height:100vh;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:8px;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#00f5ff,#9f00ff);
  color:white;
  cursor:pointer;
}

#app{display:none;}

#top{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#111;
}

.tab{
  padding:8px 14px;
  background:#222;
  border-radius:10px;
  cursor:pointer;
}

.feed{
  height:calc(100vh - 60px);
  overflow-y:auto;
  padding:10px;
}

.post{
  background:#151515;
  margin:10px auto;
  padding:15px;
  border-radius:12px;
  max-width:400px;
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.icon{
  background:#222;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

#postBox{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
}

#notif{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:10px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div id="notif"></div>

<!-- AUTH -->
<div id="auth">
  <h2>Mystarsnight Code</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="username" placeholder="Username">
  <input id="avatar" placeholder="Avatar URL">

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

  <div id="top">
    <div class="tab" onclick="show('discover')">🔍 Discover</div>
    <div class="tab" onclick="show('codies')">🎥 Codies</div>
  </div>

  <div class="feed" id="discover"></div>
  <div class="feed" id="codies" style="display:none;"></div>

  <div id="postBox">
    <input id="postInput" placeholder="Post code...">
    <button onclick="post()">🚀</button>
  </div>

</div>

<script>
const supabase = supabase.createClient(
"https://heemtxdkjxnlzggtpbsf.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZW10eGRranhubHpnZ3RwYnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODUwMTcsImV4cCI6MjA5MjQ2MTAxN30.C-Q1X4XGjz4mZyrkkmW3N4uPFGu1eDe9sb7QWfs9_dU"
);

let user=null;

/* NOTIF */
function notify(msg){
  notif.innerText=msg;
  notif.style.display="block";
  setTimeout(()=>notif.style.display="none",2000);
}

/* SIGNUP FIXED */
async function signup(){
  const { data, error } = await supabase.auth.signUp({
    email: email.value,
    password: password.value
  });

  if(error){
    notify(error.message);
    return;
  }

  if(!data.user){
    notify("Check email to confirm signup");
    return;
  }

  const { error: profileError } = await supabase
    .from("profiles")
    .insert({
      id: data.user.id,
      username: username.value,
      avatar_url: avatar.value,
      is_admin: email.value === "blakestalder123@gmail.com"
    });

  if(profileError){
    notify(profileError.message);
    return;
  }

  notify("Signup success!");
}

/* LOGIN */
async function login(){
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){
    notify(error.message);
    return;
  }

  start(data.user);
}

/* START */
async function start(u){
  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id",u.id)
    .single();

  user=data;

  auth.style.display="none";
  app.style.display="block";

  loadDiscover();
  loadCodies();
}

/* TAB SWITCH */
function show(tab){
  discover.style.display = tab==="discover"?"block":"none";
  codies.style.display = tab==="codies"?"block":"none";
}

/* DISCOVER */
async function loadDiscover(){
  const { data } = await supabase
    .from("posts")
    .select("*, profiles(username)")
    .order("created_at",{ascending:false});

  discover.innerHTML="";

  data.forEach(p=>{
    discover.innerHTML+=`
      <div class="post">
        <b>${p.profiles?.username||"User"}</b>
        <p>${p.content}</p>

        <div class="actions">
          <div class="icon" onclick="like('${p.id}')">❤️</div>
          <div class="icon" onclick="comment('${p.id}')">💬</div>
        </div>
      </div>
    `;
  });
}

/* CODIES */
async function loadCodies(){
  const { data } = await supabase
    .from("posts")
    .select("*, profiles(username)")
    .order("created_at",{ascending:false});

  codies.innerHTML="";

  data.forEach(p=>{
    codies.innerHTML+=`
      <div class="post">
        <h3>${p.profiles?.username||"User"}</h3>
        <p>${p.content}</p>

        <div class="actions">
          <div class="icon" onclick="like('${p.id}')">❤️</div>
          <div class="icon" onclick="comment('${p.id}')">💬</div>
        </div>
      </div>
    `;
  });
}

/* POST */
async function post(){
  const { error } = await supabase.from("posts").insert({
    user_id:user.id,
    content:postInput.value
  });

  if(error){
    notify(error.message);
    return;
  }

  postInput.value="";
  loadDiscover();
  loadCodies();
}

/* LIKE */
async function like(id){
  await supabase.from("likes").insert({
    user_id:user.id,
    post_id:id
  });
  notify("Liked!");
}

/* COMMENT */
async function comment(id){
  const t=prompt("Comment:");
  if(!t) return;

  await supabase.from("comments").insert({
    user_id:user.id,
    post_id:id,
    content:t
  });

  notify("Comment sent");
}
</script>

</body>
</html>
