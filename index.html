<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mystarsnight Code</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:radial-gradient(circle at top,#1a1a1a,#050505);
  color:white;
}

/* NAV */
nav{
  display:none;
  gap:10px;
  padding:10px;
  background:#111;
}

button{
  background:#222;
  border:none;
  color:white;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}
button:hover{transform:scale(1.05)}

.screen{display:none;padding:15px}
.active{display:block}

/* LOGIN */
#login{
  max-width:400px;
  margin:auto;
  display:flex;
  flex-direction:column;
  justify-content:center;
  height:100vh;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#1c1c1c;
  color:white;
  outline:none;
}

/* POSTS */
.post{
  background:#1a1a1a;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
}

/* CODE */
.codebox{
  background:#0f0f0f;
  padding:10px;
  border-radius:10px;
  font-family:monospace;
  white-space:pre-wrap;
}

/* MESSAGES */
.msg{
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
.error{background:#ff2b2b}
.ok{background:#2ecc71}
</style>
</head>

<body>

<nav id="nav">
<button onclick="show('discover')">Discover</button>
<button onclick="show('post')">Post</button>
<button onclick="logout()">Logout</button>
</nav>

<!-- LOGIN -->
<div id="login" class="screen active">
<h2>Mystarsnight Code</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="username" placeholder="Username">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<div id="msg"></div>
</div>

<!-- DISCOVER -->
<div id="discover" class="screen"></div>

<!-- POST -->
<div id="post" class="screen">
<textarea id="code" placeholder="Paste code..."></textarea>
<button onclick="createPost()">Post</button>
<div id="preview"></div>
</div>

<script>

console.log("SCRIPT LOADED")

/* ================= SUPABASE ================= */
const supabase = window.supabase.createClient(
"https://heemtxdkjxnlzggtpbsf.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZW10eGRranhubHpnZ3RwYnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODUwMTcsImV4cCI6MjA5MjQ2MTAxN30.C-Q1X4XGjz4mZyrkkmW3N4uPFGu1eDe9sb7QWfs9_dU"
)

let user=null
let posts=[]

/* ================= MESSAGE ================= */
function msg(text,type="error"){
  document.getElementById("msg").innerHTML=
    `<div class="msg ${type}">${text}</div>`
}

/* ================= NAV ================= */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

/* ================= SIGNUP ================= */
async function signup(){
  let email=v("email")
  let password=v("password")

  let {error}=await supabase.auth.signUp({email,password})

  if(error){
    return msg(error.message)
  }

  msg("Check email to confirm account","ok")
}

/* ================= LOGIN ================= */
async function login(){

  let {data,error}=await supabase.auth.signInWithPassword({
    email:v("email"),
    password:v("password")
  })

  if(error){
    return msg(error.message)
  }

  user=data.user

  await loadPosts()

  document.getElementById("nav").style.display="flex"
  show("discover")

  msg("Logged in","ok")
}

/* ================= LOGOUT ================= */
function logout(){
  supabase.auth.signOut()
  location.reload()
}

/* ================= POSTS ================= */
async function createPost(){

  let content=v("code")

  if(!content){
    return msg("Write something first")
  }

  let {error}=await supabase.from("posts").insert({
    content,
    user_id:user.id
  })

  if(error){
    return msg(error.message)
  }

  v("code","")
  loadPosts()

  msg("Posted","ok")
}

/* ================= LOAD POSTS ================= */
async function loadPosts(){

  let {data,error}=await supabase.from("posts").select("*")

  if(error){
    return msg(error.message)
  }

  posts=data||[]

  render()
}

/* ================= RENDER ================= */
function render(){

  let d=document.getElementById("discover")
  d.innerHTML=""

  posts.forEach(p=>{

    let div=document.createElement("div")
    div.className="post"

    div.innerHTML=`
      <div class="codebox">${format(p.content)}</div>
    `

    d.appendChild(div)
  })
}

/* ================= AUTO FORMAT ================= */
function format(code){
  if(!code) return ""

  return code
    .replace(/\t/g,"  ")
    .replace(/\n{3,}/g,"\n\n")
}

/* LIVE PREVIEW */
document.addEventListener("input",e=>{
  if(e.target.id==="code"){
    document.getElementById("preview").innerHTML=
      `<div class="codebox">${format(e.target.value)}</div>`
  }
})

/* ================= HELPERS ================= */
function v(id,val){
  if(val!==undefined){
    document.getElementById(id).value=val
  }else{
    return document.getElementById(id).value
  }
}

</script>

</body>
</html>
