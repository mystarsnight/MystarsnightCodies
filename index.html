<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Codies</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      margin: 0;
    }

    header {
      padding: 15px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: #222;
      color: white;
      border: none;
    }

    button {
      padding: 10px;
      background: #00ff99;
      border: none;
      cursor: pointer;
    }

    .post {
      background: #1c1c1c;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    pre {
      background: #000;
      padding: 10px;
      overflow-x: auto;
    }

    .feed {
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>Codies</h2>
  <div>
    <button onclick="login()">Login</button>
    <button onclick="loadPosts()">Refresh</button>
  </div>
</header>

<div style="padding:10px;">
  <h3>Create Code Post</h3>
  <input id="title" placeholder="Title">
  <input id="language" placeholder="Language (JS, Python...)">
  <textarea id="code" placeholder="Your code..."></textarea>
  <button onclick="createPost()">Post</button>
</div>

<div class="feed" id="feed"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://heemtxdkjxnlzggtpbsf.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZW10eGRranhubHpnZ3RwYnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODUwMTcsImV4cCI6MjA5MjQ2MTAxN30.C-Q1X4XGjz4mZyrkkmW3N4uPFGu1eDe9sb7QWfs9_dU";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

// LOGIN (simple email popup)
async function login() {
  const email = prompt("Email:");
  const password = prompt("Password:");

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) alert(error.message);
  else alert("Logged in!");
}

// CREATE POST
async function createPost() {
  const title = document.getElementById("title").value;
  const language = document.getElementById("language").value;
  const code = document.getElementById("code").value;

  const user = await supabase.auth.getUser();

  const { error } = await supabase.from("posts").insert({
    title,
    language,
    code,
    author: user.data.user?.email || "anon"
  });

  if (error) alert(error.message);
  else {
    alert("Posted!");
    loadPosts();
  }
}

// LOAD FEED
async function loadPosts() {
  const { data } = await supabase
    .from("posts")
    .select("*")
    .order("created_at", { ascending: false });

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(post => {
    feed.innerHTML += `
      <div class="post">
        <h3>${post.title}</h3>
        <small>${post.language} • ${post.author}</small>
        <pre><code>${post.code}</code></pre>
        <button onclick="copyCode(\`${escapeCode(post.code)}\`)">Copy</button>
      </div>
    `;
  });
}

// COPY CODE
function copyCode(code) {
  navigator.clipboard.writeText(code);
  alert("Copied!");
}

function escapeCode(str) {
  return str.replace(/`/g, "\\`");
}

// initial load
loadPosts();
</script>

</body>
</html>
