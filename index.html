<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Codies V7.2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0a0a;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111;
  border-bottom:1px solid #222;
}

.main{
  display:flex;
  height:calc(100vh - 55px);
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#0f0f0f;
  padding:12px;
  border-right:1px solid #222;
}

/* FEED */
.feed{
  flex:1;
  overflow:auto;
  padding:20px;
}

/* POST */
.card{
  background:#151515;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid #222;
}

/* INPUTS */
input,textarea{
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#1c1c1c;
  border:1px solid #333;
  color:white;
  border-radius:8px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  margin-top:6px;
  background:linear-gradient(90deg,#00ff88,#00c3ff);
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  justify-content:center;
  align-items:center;
}

.box{
  background:#141414;
  padding:20px;
  width:350px;
  border-radius:10px;
  border:1px solid #333;
}

/* POPUP */
.popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 15px;
  border:1px solid #333;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<header>
  <div>Codies</div>
  <div id="userBox"></div>
</header>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">

  <h3>Create Code</h3>

  <input id="title" placeholder="Title">
  <input id="lang" placeholder="Language">
  <textarea id="code" placeholder="Code"></textarea>

  <button onclick="createPost()">Post</button>

  <button onclick="openLogin()">Login</button>
  <button id="adminBtn" style="display:none" onclick="openAdmin()">Admin Panel</button>

</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="box">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="box">
    <h3>Admin Panel !!!</h3>

    <input id="targetUser" placeholder="User email">

    <button onclick="warn()">Warn</button>
    <button onclick="ban()">Ban</button>
    <button onclick="verify()">Verify</button>

    <button onclick="closeAdmin()">Close</button>
  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup"></div>

<script>

/* ================= SUPABASE ================= */
const supabaseUrl = "https://heemtxdkjxnlzggtpbsf.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZW10eGRranhubHpnZ3RwYnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODUwMTcsImV4cCI6MjA5MjQ2MTAxN30.C-Q1X4XGjz4mZyrkkmW3N4uPFGu1eDe9sb7QWfs9_dU"

const client = supabase.createClient(supabaseUrl, supabaseKey)

/* ================= STATE ================= */
let user = null
let profile = null

/* ================= POPUP ================= */
function show(msg){
  const p = document.getElementById("popup")
  p.innerText = msg
  p.style.display = "block"
  setTimeout(()=>p.style.display="none",2000)
}

/* ================= USER ================= */
async function getUser(){
  const { data } = await client.auth.getUser()
  user = data.user

  if(user){
    await loadProfile()
  }

  updateUI()
}

/* ================= PROFILE ================= */
async function loadProfile(){
  const { data } = await client
    .from("profiles")
    .select("*")
    .eq("email", user.email)

  if(!data || data.length === 0){
    await client.from("profiles").insert({
      email:user.email,
      role:"user",
      verified:false,
      banned:false
    })
  }

  const { data: p } = await client
    .from("profiles")
    .select("*")
    .eq("email", user.email)
    .single()

  profile = p
}

/* ================= AUTH ================= */
function openLogin(){ loginModal.style.display="flex" }
function closeLogin(){ loginModal.style.display="none" }

async function login(){
  const { error } = await client.auth.signInWithPassword({
    email:email.value,
    password:password.value
  })

  if(error) return show(error.message)

  closeLogin()
  getUser()
  loadPosts()
}

async function signup(){
  const { error } = await client.auth.signUp({
    email:email.value,
    password:password.value,
    options:{
      emailRedirectTo:"https://mystarsnight.github.io/MystarsnightCode/"
    }
  })

  if(error) show(error.message)
  else show("Check email 📩")
}

/* ================= POSTS ================= */
async function createPost(){
  if(!user) return show("Login first")

  await client.from("posts").insert({
    title:title.value,
    language:lang.value,
    code:code.value,
    author:user.email
  })

  show("Posted!")
  loadPosts()
}

async function loadPosts(){
  const { data, error } = await client.from("posts")
    .select("*")
    .order("created_at",{ascending:false})

  if(error){
    feed.innerHTML = "<div>DB error: "+error.message+"</div>"
    return
  }

  if(!data || data.length === 0){
    feed.innerHTML = "<div>No posts yet</div>"
    return
  }

  feed.innerHTML = ""

  data.forEach(p=>{
    const div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
      <b>${p.title}</b><br>
      <small>${p.language} • ${p.author}</small>
      <pre>${p.code}</pre>
    `

    feed.appendChild(div)
  })
}

/* ================= ADMIN ================= */
function isAdmin(){
  return profile?.role === "admin"
}

function openAdmin(){
  if(!isAdmin()) return show("Not admin")
  adminModal.style.display="flex"
}

function closeAdmin(){
  adminModal.style.display="none"
}

async function warn(){
  await client.from("warnings").insert({
    user_email:targetUser.value,
    reason:"warning"
  })

  show("User warned")
}

async function ban(){
  await client.from("profiles")
    .update({ banned:true })
    .eq("email", targetUser.value)

  show("User banned")
}

async function verify(){
  await client.from("profiles")
    .update({ verified:true })
    .eq("email", targetUser.value)

  show("User verified")
}

/* ================= UI ================= */
function updateUI(){
  userBox.innerHTML = user
    ? user.email
    : `<button onclick="openLogin()">Login</button>`

  adminBtn.style.display = isAdmin() ? "block" : "none"
}

/* ================= INIT ================= */
client.auth.onAuthStateChange((_, session)=>{
  if(session){
    user = session.user
    loadProfile()
    updateUI()
  }
})

getUser()
loadPosts()

</script>

</body>
</html>
